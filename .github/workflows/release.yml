name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Verify release tag matches project version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $expectedVersion = $tag.TrimStart("v")
          $packageVersion = node -p "require('./package.json').version"
          $tauriVersion = node -p "JSON.parse(require('fs').readFileSync('./src-tauri/tauri.conf.json', 'utf8')).version"
          $cargoVersion = Select-String -Path "./src-tauri/Cargo.toml" -Pattern '^version = "(.+)"$' | Select-Object -First 1
          if (-not $cargoVersion) {
            throw "未能从 src-tauri/Cargo.toml 读取版本号。"
          }
          $cargoVersion = $cargoVersion.Matches[0].Groups[1].Value

          if ($packageVersion -ne $expectedVersion) {
            throw "package.json 版本号 $packageVersion 与 tag $tag 不一致。"
          }
          if ($tauriVersion -ne $expectedVersion) {
            throw "src-tauri/tauri.conf.json 版本号 $tauriVersion 与 tag $tag 不一致。"
          }
          if ($cargoVersion -ne $expectedVersion) {
            throw "src-tauri/Cargo.toml 版本号 $cargoVersion 与 tag $tag 不一致。"
          }

      - name: Build Windows release bundle
        run: npm run build:exe

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $repository = "${{ github.repository }}"
          $assetPath = Resolve-Path ".\release-packages\ainovelstudio_*_windows_x64.exe" | Select-Object -First 1

          if (-not $assetPath) {
            throw "未找到标准化命名的 Windows 安装包。"
          }

          $releaseNotes = @"
          自动发布于 GitHub Actions。

          安装包请在 Assets 中下载。
          "@

          $headers = @{
            Accept = "application/vnd.github+json"
            Authorization = "Bearer $env:GITHUB_TOKEN"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $apiBase = "https://api.github.com/repos/$repository"

          try {
            $release = Invoke-RestMethod -Method Get -Uri "$apiBase/releases/tags/$tag" -Headers $headers
          } catch {
            $statusCode = $_.Exception.Response.StatusCode.value__
            if ($statusCode -ne 404) {
              throw
            }

            $payload = @{
              tag_name = $tag
              name = $tag
              body = $releaseNotes
              draft = $false
              prerelease = $false
            } | ConvertTo-Json

            $release = Invoke-RestMethod `
              -Method Post `
              -Uri "$apiBase/releases" `
              -Headers $headers `
              -Body $payload `
              -ContentType "application/json"
          }

          $assetName = [System.IO.Path]::GetFileName($assetPath.Path)
          $existingAsset = $release.assets | Where-Object { $_.name -eq $assetName } | Select-Object -First 1

          if ($existingAsset) {
            Invoke-RestMethod -Method Delete -Uri "$apiBase/releases/assets/$($existingAsset.id)" -Headers $headers
          }

          $uploadUrl = ($release.upload_url -replace '\{\?name,label\}', "") + "?name=$assetName"
          $assetBytes = [System.IO.File]::ReadAllBytes($assetPath.Path)

          Invoke-RestMethod `
            -Method Post `
            -Uri $uploadUrl `
            -Headers $headers `
            -Body $assetBytes `
            -ContentType "application/octet-stream"
